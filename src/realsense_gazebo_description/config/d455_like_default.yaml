# D455-like RGB-D Simulator Default Configuration
# 这不是 RealSense D455 物理参数。所有值均为可配置的仿真近似值。

# Color camera
color_width: 640
color_height: 480
color_fps: 10
color_hfov_deg: 69.4
color_noise_mean: 0.0
color_noise_stddev: 0.007

# Depth camera
depth_width: 640
depth_height: 480
depth_fps: 10
depth_hfov_deg: 69.4
depth_near: 0.15
depth_far: 10.0
depth_noise_mean: 0.0
depth_noise_stddev: 0.005

# IR cameras (required by plugin, kept minimal)
infra_width: 320
infra_height: 240
infra_fps: 10

# Features
align_depth: false
enable_pointcloud: false
visualize: false

# Camera identity
camera_name: "camera"
topics_ns: "camera"
