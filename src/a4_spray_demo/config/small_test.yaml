# First physical motion test: 100 x 30 mm, two long strokes.
group_name: cr5_arm
reference_frame: base_link
eef_link: Tool_end

paper_long_mm: 100.0
paper_short_mm: 30.0
margin_long_mm: 0.0
margin_short_mm: 0.0
num_lines: 2

eef_step_m: 0.005
jump_threshold: 0.0
avoid_collisions: true
fraction_threshold: 0.999
planning_attempts: 3

velocity_scaling: 0.03
acceleration_scaling: 0.03
max_allowed_execution_scaling: 0.05

planning_time_s: 20.0
goal_position_tolerance_m: 0.005
goal_orientation_tolerance_rad: 0.05

execute: false
confirmation: ""
required_confirmation: "CR5_A4_EXECUTE"
countdown_seconds: 5
require_robot_health: true
preview_hold_seconds: 15.0

display_trajectory_topic: /move_group/display_planned_path
path_marker_topic: /a4_spray_demo/path_marker
