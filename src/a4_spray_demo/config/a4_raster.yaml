# Full A4 landscape raster.
group_name: cr5_arm
reference_frame: base_link

# The current URDF contains Tool_end. Confirm that this frame matches the
# physical pointer/tool before real execution. Use Link6 if it does not.
eef_link: Tool_end

paper_long_mm: 297.0
paper_short_mm: 210.0
margin_long_mm: 20.0
margin_short_mm: 20.0

# 257 x 170 mm effective area, seven long strokes, 28.33 mm actual spacing.
num_lines: 7

# Cartesian path interpolation.
eef_step_m: 0.005
jump_threshold: 0.0
avoid_collisions: true
fraction_threshold: 0.999
planning_attempts: 3

# These are planning-side factors only. The existing DOBOT action bridge
# ignores trajectory time_from_start; the controller-side SpeedFactor is the
# more important real speed limit.
velocity_scaling: 0.05
acceleration_scaling: 0.05
max_allowed_execution_scaling: 0.05

planning_time_s: 30.0
goal_position_tolerance_m: 0.005
goal_orientation_tolerance_rad: 0.05

# Safety gates.
execute: false
confirmation: ""
required_confirmation: "CR5_A4_EXECUTE"
countdown_seconds: 5
require_robot_health: true

# Keep the plan-only node alive long enough for RViz to receive latched topics.
preview_hold_seconds: 15.0

display_trajectory_topic: /move_group/display_planned_path
path_marker_topic: /a4_spray_demo/path_marker
