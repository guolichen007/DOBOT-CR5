planning_group: cr5_arm
eef_link: Tool_end
base_frame: base_link

locked_pose_topic: /book_demo/estimator/locked_pose
locked_size_topic: /book_demo/estimator/locked_size
target_locked_topic: /book_demo/estimator/target_locked

# First test: one center stroke from the visual top to the visual bottom.
# After this passes, change to raster.
path_mode: single_stroke

# Measure this exact book with a ruler before planning. The defaults are only
# placeholders and are intentionally not treated as calibrated dimensions.
use_detected_size: false
book_length_m: 0.260
book_width_m: 0.190

margin_long_m: 0.025
margin_short_m: 0.025
pass_spacing_m: 0.035
serpentine: true

# Dry-run air gap above the cover. Start generously and reduce only after
# spray_tcp is verified against the real tool.
standoff_m: 0.100
approach_clearance_m: 0.080
retreat_clearance_m: 0.080
cartesian_step_m: 0.005
jump_threshold: 0.0
min_fraction: 0.995

# keep_current is the safe first-stage mode: manually orient the tool normal to
# the horizontal cover before planning. align_to_book is permitted only after a
# verified spray_tcp exists and its +Z axis points from the nozzle to the target.
orientation_mode: keep_current
roll_offset_deg: 0.0

planning_time_s: 8.0
planning_attempts: 8
velocity_scale: 0.03
acceleration_scale: 0.03
max_plan_age_s: 120.0
max_target_shift_m: 0.003
max_target_angle_deg: 0.8

# Enable only after the table and book collision boxes have been measured and
# checked in RViz. Incorrect boxes can also invalidate otherwise safe planning.
add_collision_scene: false
book_thickness_m: 0.055
table_length_m: 1.50
table_width_m: 0.55
table_thickness_m: 0.05
