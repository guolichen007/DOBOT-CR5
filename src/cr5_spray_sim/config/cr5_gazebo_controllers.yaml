# CR5 Gazebo Controller Configuration
# 仿真专用控制器参数。不是实机控制参数。

# Joint state controller
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

# Arm trajectory controller (Position interface)
arm_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
  constraints:
    goal_time: 0.6
    stopped_velocity_tolerance: 0.05
    joint1: {trajectory: 0.1, goal: 0.1}
    joint2: {trajectory: 0.1, goal: 0.1}
    joint3: {trajectory: 0.1, goal: 0.1}
    joint4: {trajectory: 0.1, goal: 0.1}
    joint5: {trajectory: 0.1, goal: 0.1}
    joint6: {trajectory: 0.1, goal: 0.1}
  stop_trajectory_duration: 0.5
  state_publish_rate: 25
  action_monitor_rate: 10

# Optional: velocity PID gains (sim only, not real hardware values)
gazebo_ros_control:
  pid_gains:
    joint1: {p: 100.0, i: 0.01, d: 10.0}
    joint2: {p: 100.0, i: 0.01, d: 10.0}
    joint3: {p: 100.0, i: 0.01, d: 10.0}
    joint4: {p: 100.0, i: 0.01, d: 10.0}
    joint5: {p: 100.0, i: 0.01, d: 10.0}
    joint6: {p: 100.0, i: 0.01, d: 10.0}
