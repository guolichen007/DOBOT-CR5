# MoveIt ↔ Gazebo Controller Mapping
# MoveItSimpleControllerManager 配置

controller_list:
  - name: "arm_controller"
    action_ns: "follow_joint_trajectory"
    type: FollowJointTrajectory
    default: true
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6

# MoveIt controller manager type
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager
